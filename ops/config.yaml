# Ars Contexta — Human-Editable Configuration
# Edit this file to adjust system behavior. Changes take effect next session.

# --- Dimension Positions (from derivation) ---
dimensions:
  granularity: atomic          # one claim per note
  organization: flat           # cross-disciplinary, no nested hierarchies
  linking: explicit+implicit   # wiki-links + semantic search (when qmd configured)
  processing: heavy            # full extraction pipeline
  navigation: 3-tier           # hub → discipline topic maps → claims
  maintenance: condition-based # tight thresholds, triggered on orphan/tension counts
  schema: moderate             # evidence ratings, source tracking, decision classification
  automation: full             # hooks + skills, pipeline automation

# --- Features ---
features:
  semantic-search: true        # requires qmd: bun install -g @tobilu/qmd
  processing-pipeline: true    # /extract → /connect → /reweave cycle

# --- Processing ---
processing:
  depth: standard              # standard | deep | surface
  chaining: suggested          # suggested | required | disabled
  extraction_categories:
    - claims                   # central arguments, empirical findings
    - decisions                # architectural choices with rationale (D1-D69 style)
    - properties               # formal invariants, theorems, type-level guarantees
    - patterns                 # design techniques, implementation idioms
    - contradictions           # where sources or approaches conflict
    - open-questions           # unresolved research gaps, future work

# --- Provenance ---
provenance: full               # full | summary | none — track source + evidence for every claim

# --- Personality ---
personality:
  enabled: false
  warmth: neutral-helpful
  opinionatedness: neutral
  formality: professional
  emotional_awareness: task-focused

# --- Research Tools ---
research_tools:
  primary: web-search
  fallback: web-search
  last_resort: web-search

# --- Maintenance Thresholds ---
maintenance:
  orphan_warning: 10           # warn when orphan count exceeds this
  pending_observations: 5      # warn when unprocessed observations exceed this
  pending_tensions: 3          # warn when unresolved tensions exceed this
  session_capture: true        # save session metadata on stop

# --- Self Space ---
self:
  enabled: false
  goals_path: ops/goals.md
  methodology_path: ops/methodology/methodology.md
